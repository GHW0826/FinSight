spring.application.name=fin
spring.datasource.url=jdbc:h2:file:./data/finsight-news;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.news.google.search-url=https://news.google.com/search?q=finance&hl=ko&gl=KR&ceid=KR%3Ako
app.news.google.rss-url=https://news.google.com/rss/search?q=finance&hl=ko&gl=KR&ceid=KR%3Ako
app.news.google.keyword=finance
app.news.google.max-scroll-count=6
app.news.google.scroll-pause-millis=1500
app.news.google.max-articles-per-run=30
app.news.google.headless=true
app.news.google.page-load-timeout-seconds=20
